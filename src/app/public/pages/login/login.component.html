<div class="bg-color-primary h-100 pr-55 pl-55 d-flex flex-direction-column justify-content-center">
  <form [formGroup]="form" (ngSubmit)="onLogin()" class="d-flex flex-direction-column" style="gap: 18px; max-width: 420px; margin: 0 auto; width: 100%;">
    <h2 class="color-white fs-24 m-0" style="text-align: center;">Sign in</h2>

    <div class="d-flex flex-direction-column" style="gap: 6px;">
      <label for="email" class="color-white">Email</label>
      <input pInputText id="email" type="email" formControlName="email" autocomplete="username" />
    </div>

    <div class="d-flex flex-direction-column" style="gap: 6px;">
      <label for="password" class="color-white">Password</label>
      <p-password
        id="password"
        formControlName="password"
        [feedback]="false"
        [toggleMask]="true"
        inputStyleClass="w-100"
        styleClass="w-100"
      />
    </div>

    <p-button
      type="submit"
      label="Sign in"
      class="w-100"
      styleClass="w-100 border-color-gray"
      size="large"
      [loading]="loading()"
      [disabled]="form.invalid || loading()"
    />

    <small class="color-white" style="opacity: 0.8; text-align: center;">
      Try <strong>driver1{{ '@' }}truck.local</strong> / <strong>password</strong>
    </small>
  </form>
</div>
